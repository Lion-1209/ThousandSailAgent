name: http-request-full-test

steps:
  - id: post_test
    agent: coder
    model: glm/glm-4-flash
    prompt: "使用 http_request 工具向 https://httpbin.org/post 发送 POST 请求，body 为 JSON: {\"name\":\"tsail\",\"version\":\"0.7.0\"}，返回响应"
    tools: [http_request]
    max_steps: 3

  - id: html_test
    agent: coder
    model: glm/glm-4-flash
    prompt: "使用 http_request 工具访问 https://httpbin.org/html，使用 extract 参数提取纯文本内容"
    tools: [http_request]
    max_steps: 3

  - id: links_test
    agent: coder
    model: glm/glm-4-flash
    prompt: "使用 http_request 工具访问 https://httpbin.org/links/5/1，使用 extract: links 提取所有链接"
    tools: [http_request]
    max_steps: 3
