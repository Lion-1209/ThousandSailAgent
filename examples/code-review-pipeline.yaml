name: code-review-pipeline
description: "AI编码 → 自动审查 → 自动测试 → 改进"

providers:
  deepseek:
    base_url: https://api.deepseek.com
    api_key_env: DEEPSEEK_API_KEY
  glm:
    base_url: https://open.bigmodel.cn/api/paas/v4
    api_key_env: GLM_API_KEY

steps:
  - id: code
    agent: coder
    model: deepseek/deepseek-chat
    prompt: "根据以下需求实现功能: {{input.requirement}}"
    tools: [file_write, file_read, terminal]

  - id: review
    agent: reviewer
    model: glm/glm-4-flash
    prompt: "审查上一步生成的代码，检查安全和性能问题: {{steps.code.output}}"
    depends_on: [code]
    tools: [file_read]

  - id: test
    agent: tester
    model: deepseek/deepseek-chat
    prompt: "为以下代码生成单元测试并执行: {{steps.code.output}}"
    depends_on: [code]
    tools: [file_write, terminal]

  - id: refine
    agent: coder
    model: deepseek/deepseek-chat
    prompt: "根据审查意见和测试结果修改代码。审查: {{steps.review.output}} 测试: {{steps.test.output}}"
    depends_on: [review, test]
    tools: [file_write, file_read, terminal]
